name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem with Quick Search.
  - type: input
    id: browser-version
    attributes:
      label: Browser version
      description: "Example: Chrome 126.0.6478.127"
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      description: You can find this on the Chrome extensions page.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      description: "Example: Windows 11, macOS 14, Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the problem.
      placeholder: |
        1. Open the extension popup
        2. Select ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots or logs
      description: Add screenshots, error messages, or console logs if they help explain the issue.
    validations:
      required: false
