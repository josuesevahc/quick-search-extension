<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Search</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 id="title"></h1>
      <p id="description"></p>
    </header>

    <main>
      <section class="providers-section">
        <div class="section-header">
          <h2 id="providers-title">Buscadores</h2>
          <button id="add-provider-btn" class="btn-primary"></button>
        </div>
        <div id="providers-list" class="providers-list"></div>
      </section>

      <section class="actions-section">
        <button id="restore-defaults-btn" class="btn-danger"></button>
      </section>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <h3 id="modal-title"></h3>
        <form id="provider-form">
          <input type="hidden" id="edit-id">
          <div class="form-group">
            <label for="name" id="name-label"></label>
            <input type="text" id="name" required>
          </div>
          <div class="form-group">
            <label for="url" id="url-label"></label>
            <input type="text" id="url" required>
            <small id="url-help"></small>
          </div>
          <div class="modal-actions">
            <button type="button" id="cancel-btn" class="btn-secondary"></button>
            <button type="submit" id="save-btn" class="btn-primary"></button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script type="module" src="options.ts"></script>
</body>
</html>
